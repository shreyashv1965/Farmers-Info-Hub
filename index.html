<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Farmers Info Hub</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
    header { background: #4CAF50; color: white; padding: 20px; text-align: center; }
    nav { background: #333; padding: 10px; }
    nav a { color: white; margin: 0 10px; text-decoration: none; }
    section { padding: 20px; }
    footer { background: #f1f1f1; text-align: center; padding: 10px; margin-top: 20px; }

    /* Search section styling */
    #search { margin-top: 30px; }
    #searchBox { padding: 8px; width: 300px; }
    #results p { background: #eee; padding: 5px; margin: 5px 0; }
  </style>
</head>
<body>
  <header>
    <h1>Farmers Info Hub</h1>
    <p>Your gateway to modern farming knowledge</p>
  </header>

  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>

  <section>
    <h2>Welcome</h2>
    <p>This hub provides resources and insights for farmers to adopt modern techniques and sustainable practices.</p>

    <!-- 🔹 Search Section added here -->
    <section id="search">
      <h2>Search Farmers Info Hub</h2>
      <input type="text" id="searchBox" placeholder="Type to search...">
      <div id="results"></div>
    </section>
  </section>

  <footer>
    <p>&copy; 2026 Farmers Info Hub</p>
  </footer>

  <!-- 🔹 Search Script -->
  <script>
    const data = [
      "Organic farming",
      "Modern tools",
      "Crop rotation",
      "Sustainable methods",
      "Smart irrigation",
      "Soil health"
    ];

    const box = document.getElementById("searchBox");
    const results = document.getElementById("results");

    box.addEventListener("input", () => {
      const query = box.value.toLowerCase();
      results.innerHTML = data
        .filter(item => item.toLowerCase().includes(query))
        .map(item => `<p>${item}</p>`)
        .join("");
    });
  </script>
</body>
</html>
